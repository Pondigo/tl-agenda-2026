<style>
*{box-sizing:border-box;margin:0;padding:0}

/* CSS VARIABLES — LIGHT */
:root{--bg:#fff;--bg2:#f5f5f5;--fg:#111;--fg2:#555;--fg3:#888;--fg4:#bbb;--fg5:#ccc;--border:#e0e0e0;--border2:#f0f0f0;--card-rec:#fafafa;--fb-bg:#fff;--dot-off:#ccc;--tag-bg:#111;--tag-fg:#fff}

/* DARK THEME */
[data-theme="dark"]{--bg:#111;--bg2:#1a1a1a;--fg:#eee;--fg2:#aaa;--fg3:#777;--fg4:#555;--fg5:#333;--border:#282828;--border2:#1e1e1e;--card-rec:#1a1a1a;--fb-bg:#111;--dot-off:#444;--tag-bg:#eee;--tag-fg:#111}

body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--fg);padding:0 0 72px;-webkit-text-size-adjust:100%;transition:background .2s,color .2s}

/* HEADER */
.hdr{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:10px 16px 6px}
.hdr-top{display:flex;justify-content:space-between;align-items:center}
.hdr h1{font-size:17px;font-weight:800;letter-spacing:-.3px}
.hdr .sub{font-size:10px;color:var(--fg3);margin-top:1px;letter-spacing:.2px}

/* THEME TOGGLE */
.tt{width:32px;height:18px;border-radius:9px;border:1.5px solid var(--fg4);background:var(--bg2);cursor:pointer;position:relative;flex-shrink:0;transition:all .2s}
.tt::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:var(--fg);transition:transform .2s}
[data-theme="dark"] .tt::after{transform:translateX(14px)}

/* SHARE BTN */
.sh-btn{width:32px;height:32px;border:none;background:none;cursor:pointer;color:var(--fg3);font-size:16px;display:flex;align-items:center;justify-content:center;border-radius:50%;flex-shrink:0;transition:color .2s}
.sh-btn:active{color:var(--fg);background:var(--bg2)}
.hdr-right{display:flex;align-items:center;gap:6px}

/* SEARCH */
.srch{margin:8px 0 4px;position:relative}
.srch input{width:100%;padding:9px 12px 9px 32px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--fg);font-size:14px;outline:none}
.srch input:focus{border-color:var(--fg)}
.srch::before{content:'';position:absolute;left:11px;top:50%;transform:translateY(-50%);width:14px;height:14px;border:2px solid var(--fg3);border-radius:50%}
.srch::after{content:'';position:absolute;left:23px;top:60%;width:2px;height:6px;background:var(--fg3);transform:rotate(-45deg)}

/* FILTERS */
.flt{display:flex;gap:5px;overflow-x:auto;padding:5px 0;scrollbar-width:none}
.flt::-webkit-scrollbar{display:none}
.fb{flex-shrink:0;padding:4px 10px;background:var(--fb-bg);border:1px solid var(--border);border-radius:16px;color:var(--fg3);font-size:10px;cursor:pointer;white-space:nowrap;font-weight:500}
.fb.on{background:var(--fg);color:var(--bg);border-color:var(--fg)}

/* TIME */
.tl{position:sticky;top:68px;z-index:50;background:var(--bg);padding:14px 16px 4px;font-size:28px;font-weight:900;color:var(--fg);letter-spacing:-1px;border-bottom:1px solid var(--border2)}

/* CARDS */
.c{border-bottom:1px solid var(--border2);padding:12px 16px;position:relative}
.c.rec{background:var(--card-rec);border-left:2px solid var(--fg)}
.c.kn{background:var(--card-rec);border-left:2px solid var(--fg)}

/* LIVE DOT */
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--dot-off);margin-right:6px;vertical-align:middle;flex-shrink:0}
.dot.live{background:#e00;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

.c-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.c-type{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--fg3)}
.c-type.kn{color:var(--fg)}
.c-land{font-size:9px;color:var(--fg4);font-weight:500}

.c-title{font-size:15px;font-weight:600;line-height:1.35;margin-bottom:4px;color:var(--fg)}

.c-meta{display:flex;gap:10px;flex-wrap:wrap;font-size:11px;color:var(--fg3);align-items:center}
.c-speaker{font-size:12px;color:var(--fg2);font-weight:500;margin-top:3px}
.c-bio{font-size:11px;color:var(--fg3);line-height:1.4;margin-top:4px}

.tag{display:inline-block;font-size:9px;font-weight:700;background:var(--tag-bg);color:var(--tag-fg);padding:1px 6px;border-radius:3px;margin-bottom:4px;letter-spacing:.3px}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);display:flex;z-index:100;padding:4px 0 env(safe-area-inset-bottom,4px)}
.nb{flex:1;text-align:center;padding:6px 4px;color:var(--fg4);font-size:9px;cursor:pointer;border:none;background:none;font-weight:600}
.nb.on{color:var(--fg)}
.nb i{display:block;font-size:16px;font-style:normal;margin-bottom:1px}

.empty{text-align:center;padding:60px 20px;color:var(--fg5);font-size:13px}

/* MAP VIEW */
#mapView{display:none;padding:12px 10px 0;overflow-x:auto;-webkit-overflow-scrolling:touch}
#mapView.show{display:block}
#mapView svg{display:block;margin:0 auto;max-width:100%;height:auto}
.mz{stroke-width:1.5;fill-opacity:.08;rx:6;ry:6;cursor:pointer}
.mz:active{fill-opacity:.22}
.ml{font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-weight:700;fill:var(--fg);pointer-events:none}
.ml-sm{font-size:7.5px;fill:var(--fg3)}
.ml-icon{font-size:11px}
.map-bg{fill:var(--bg2);rx:12;ry:12}
.map-road{stroke:var(--border);stroke-width:1;stroke-dasharray:4,3;fill:none}
.map-title{font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:10px;fill:var(--fg3);font-weight:600;text-anchor:middle;letter-spacing:.5px}
.map-label-wc{font-size:8px;fill:var(--fg4);font-family:-apple-system,sans-serif}
.map-entry{font-size:9px;fill:var(--fg3);font-weight:700;text-anchor:middle;letter-spacing:1px;font-family:-apple-system,sans-serif}

/* Fav circle */
.fv{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--border);transition:all .15s}
.fv.on{border-color:var(--fg);background:var(--fg);color:var(--bg)}
</style>
</head>

let F={},cf='all',cv='all',sq='';
try{F=JSON.parse(localStorage.getItem('tlF')||'{}')}catch(e){F={}}
function sf(){try{localStorage.setItem('tlF',JSON.stringify(F))}catch(e){}}

function isLive(s){
  const now=new Date(),h=now.getHours(),m=now.getMinutes(),cm=h*60+m;
  const[sh,sm]=s.t.split(':').map(Number),[eh,em]=s.e.split(':').map(Number);
  return cm>=sh*60+sm && cm<eh*60+em;
}

function mf(s){
  if(cf==='all')return true;
  if(cf==='rec')return s.r;
  return s.s.includes(cf)||s.l.includes(cf);
}
function ms(s){
  if(!sq)return true;
  const q=sq.toLowerCase();
  return s.n.toLowerCase().includes(q)||s.p.toLowerCase().includes(q)||s.s.toLowerCase().includes(q)||s.l.toLowerCase().includes(q)||s.y.toLowerCase().includes(q);
}

function render(){
  const c=document.getElementById('ag');
  let h='',lt='',vc=0;
  S.forEach((s,i)=>{
    if(cv==='fav'&&!F[i])return;
    if(cv==='rec'&&!s.r)return;
    if(!mf(s)||!ms(s))return;
    vc++;
    if(s.t!==lt){lt=s.t;h+=`<div class="tl">${s.t}</div>`}
    const live=isLive(s),isR=s.r,isK=s.y==='Keynote',isF=F[i];
    let cls='c';if(isK)cls+=' kn';else if(isR)cls+=' rec';
    h+=`<div class="${cls}">`;
    if(isR&&!isK)h+=`<div class="tag">RECOMENDADA</div>`;
    if(isK)h+=`<div class="tag">KEYNOTE</div>`;
    h+=`<div class="c-top"><span class="c-type${isK?' kn':''}">${s.y}</span>`;
    h+=`<div style="display:flex;align-items:center;gap:8px">`;
    if(s.l)h+=`<span class="c-land">${s.l}</span>`;
    h+=`<div class="fv${isF?' on':''}" data-i="${i}" onclick="tf(${i})">&#10003;</div>`;
    h+=`</div></div>`;
    h+=`<div class="c-title">${s.n}</div>`;
    h+=`<div class="c-meta"><span class="dot${live?' live':''}"></span>${s.t}–${s.e} · ${s.s}</div>`;
    if(s.p)h+=`<div class="c-speaker">${s.p}</div>`;
    if(s.b&&(isR||isK))h+=`<div class="c-bio">${s.b}</div>`;
    h+=`</div>`;
  });
  if(!vc)h='<div class="empty">Sin resultados. Prueba otro filtro.</div>';
  c.innerHTML=h;
}

function tf(i){if(F[i])delete F[i];else F[i]=true;sf();render()}

document.getElementById('si').addEventListener('input',e=>{sq=e.target.value;render()});

document.getElementById('flt').addEventListener('click',e=>{
  const b=e.target.closest('.fb');if(!b)return;
  document.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');cf=b.dataset.f;render();
});

document.querySelector('.bnav').addEventListener('click',e=>{
  const b=e.target.closest('.nb');if(!b)return;
  if(b.id==='nowBtn'){
    // If on map view, switch back to agenda first
    if(document.getElementById('mapView').classList.contains('show')){
      document.getElementById('mapView').classList.remove('show');
      document.getElementById('ag').style.display='';
      document.querySelector('.hdr').style.display='';
      cv='all';
      document.querySelectorAll('.nb').forEach(x=>x.classList.remove('on'));
      document.querySelector('.nb[data-v="all"]').classList.add('on');
      render();
    }
    const now=new Date(),cm=now.getHours()*60+now.getMinutes();
    const tls=document.querySelectorAll('.tl');let tgt=null;
    for(const t of tls){
      const[h,m]=t.textContent.trim().split(':').map(Number);
      const tm=h*60+m;
      if(tm<=cm)tgt=t;
      else if(!tgt&&tm>cm){tgt=t;break}
    }
    if(!tgt&&tls.length)tgt=tls[tls.length-1];
    if(tgt)tgt.scrollIntoView({behavior:'smooth',block:'start'});
    return;
  }
  document.querySelectorAll('.nb').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');
  const v=b.dataset.v;
  if(v==='map'){
    document.getElementById('ag').style.display='none';
    document.querySelector('.hdr').style.display='none';
    document.getElementById('mapView').classList.add('show');
    window.scrollTo(0,0);
  } else {
    document.getElementById('mapView').classList.remove('show');
    document.getElementById('ag').style.display='';
    document.querySelector('.hdr').style.display='';
    cv=v;render();
  }
});

// THEME: detect preference, persist choice
function getTheme(){
  const saved=localStorage.getItem('tlTheme');
  if(saved)return saved;
  return window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
}
function applyTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('tlTheme',t)}
function toggleTheme(){const t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';applyTheme(t)}
applyTheme(getTheme());
// Listen for OS theme changes
if(window.matchMedia){window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',e=>{if(!localStorage.getItem('tlTheme'))applyTheme(e.matches?'dark':'light')})}

// Auto-refresh live dots every 30s
setInterval(()=>{
  document.querySelectorAll('.dot').forEach(d=>{
    const card=d.closest('.c');if(!card)return;
    const meta=card.querySelector('.c-meta');if(!meta)return;
    const txt=meta.textContent;
    const m=txt.match(/(\d{2}):(\d{2})\u2013(\d{2}):(\d{2})/);
    if(!m)return;
    const now=new Date(),cm=now.getHours()*60+now.getMinutes();
    const st=parseInt(m[1])*60+parseInt(m[2]),en=parseInt(m[3])*60+parseInt(m[4]);
    if(cm>=st&&cm<en)d.classList.add('live');else d.classList.remove('live');
  });
},30000);

// SHARE: uses Web Share API (triggers AirDrop/Bluetooth sheet on iOS/Android)
function shareFile(){
  const blob=new Blob([document.documentElement.outerHTML],{type:'text/html'});
  const file=new File([blob],'talent-land-mie8.html',{type:'text/html'});
  if(navigator.canShare&&navigator.canShare({files:[file]})){
    navigator.share({files:[file],title:'Talent Land 2026 — Mié 8 Agenda',text:'Agenda offline Talent Land 2026 by @pondinora'}).catch(()=>{});
  } else if(navigator.share){
    navigator.share({title:'Talent Land 2026 — Mié 8 Agenda',text:'Agenda offline Talent Land 2026 by @pondinora'}).catch(()=>{});
  } else {
    alert('Abre el menú de tu navegador para compartir este archivo por AirDrop o Bluetooth.');
  }
}
// Hide share button if no share API
if(!navigator.share)document.getElementById('shareBtn').style.display='none';

render();
